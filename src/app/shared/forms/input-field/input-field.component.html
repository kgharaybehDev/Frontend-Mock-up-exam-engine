<div class="flex flex-col gap-1">
  <label class="block text-sm font-medium text-gray-700 mb-1.5" [attr.for]="id()">
    {{ label() }}
    @if (required()) { <span class="text-red-500" aria-hidden="true">*</span> }
  </label>
  <div class="relative">
    @if (leadingIcon()) {
      <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
        <ng-content select="[leading-icon]" />
      </span>
    }
    <input
      [id]="id()"
      [type]="type()"
      [placeholder]="placeholder()"
      [required]="required()"
      [disabled]="disabled()"
      [readonly]="readonly()"
      [attr.aria-invalid]="!!error()"
      [attr.aria-describedby]="errorId()"
      [class]="inputClasses()"
      [value]="value()"
      (input)="onInput($event)"
      (blur)="onTouched()"
    />
  </div>
  @if (hint() && !error()) {
    <p class="text-xs text-gray-500">{{ hint() }}</p>
  }
  @if (error()) {
    <p class="text-xs text-red-600" [id]="errorId()" role="alert">{{ error() }}</p>
  }
</div>
