<div class="flex flex-col gap-1">
    <label class="form-label" [attr.for]="id()">
    {{ label() }}
    @if (required()) { <span class="text-red-500" aria-hidden="true">*</span> }
  </label>
  <div class="relative">
    @if (leadingIcon()) {
      <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
        <ng-content select="[leading-icon]" />
      </span>
    }
    <input
      [id]="id()"
      [type]="type()"
      [placeholder]="placeholder()"
      [autocomplete]="autocomplete()"
      [required]="required()"
      [disabled]="isDisabled()"
      [readonly]="readonly()"
      [attr.aria-invalid]="!!error()"
      [attr.aria-describedby]="!!error() ? errorId() : null"
      class="form-input"
      [class.form-input-error]="!!error()"
      [class.pl-10]="leadingIcon()"
      [class.bg-gray-100]="isDisabled()"
      [class.cursor-not-allowed]="isDisabled()"
      [value]="value()"
      (input)="onInput($event)"
      (blur)="onTouched()"
    />
  </div>
  @if (hint() && !error()) {
    <p class="text-xs text-gray-500">{{ hint() }}</p>
  }
  @if (error()) {
    <p class="text-xs text-red-600" [id]="errorId()" role="alert">{{ error() }}</p>
  }
</div>
