<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <app-card class="max-w-lg w-full text-center" [title]="examTitle()">
    <div class="py-6 space-y-6">
      @if (passed()) {
        <div class="mx-auto w-20 h-20 rounded-full bg-emerald-100 flex items-center justify-center" aria-hidden="true">
          <svg class="h-10 w-10 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-emerald-700">You Passed!</h2>
      } @else {
        <div class="mx-auto w-20 h-20 rounded-full bg-red-100 flex items-center justify-center" aria-hidden="true">
          <svg class="h-10 w-10 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-red-700">Did Not Pass</h2>
      }

      <div class="grid grid-cols-2 gap-4 text-center">
        <div class="bg-gray-50 rounded-lg p-4">
          <p class="text-3xl font-bold text-gray-900">{{ score() }}%</p>
          <p class="text-sm text-gray-500 mt-1">Your Score</p>
        </div>
        <div class="bg-gray-50 rounded-lg p-4">
          <p class="text-3xl font-bold text-gray-900">{{ formattedTime() }}</p>
          <p class="text-sm text-gray-500 mt-1">Time Taken</p>
        </div>
      </div>

      @if (message()) {
        <p class="text-gray-600">{{ message() }}</p>
      }

      @if (reportUrl()) {
        <a
          [href]="reportUrl()"
          target="_blank"
          class="btn btn-full text-white bg-blue-600 hover:bg-blue-700 focus:ring-blue-500"
          rel="noopener noreferrer"
        >
          View Full Report
        </a>
      }
    </div>

    <div class="flex flex-col sm:flex-row gap-3" card-footer>
      <a routerLink="/candidate/dashboard" class="btn btn-full">
        Back to Dashboard
      </a>
    </div>
  </app-card>
</div>
